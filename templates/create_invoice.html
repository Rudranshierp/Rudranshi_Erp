<!DOCTYPE html>
<html>
<head>
    <title>Create Invoice</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background:#f5f7fb; }

        .card-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 3px 12px rgba(0,0,0,0.08);
        }

        table th {
            background: #0b1a2f;
            color: white;
        }

        .summary-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
        }
    </style>

    <script>
        function setProductDetails(select) {
            let selected = select.options[select.selectedIndex];

            let price = selected.getAttribute("data-price");
            let gst = selected.getAttribute("data-gst");

            let row = select.closest("tr");

            row.querySelector('[name="price[]"]').value = price || 0;
            row.querySelector('[name="gst[]"]').value = gst || 0;

            calculateTotal();
        }

        function addRow() {
            let table = document.getElementById("items");
            let row = table.insertRow();

            row.innerHTML = `
                <td>
                    <select name="product[]" class="form-control" onchange="setProductDetails(this)" required>
                        <option value="">Select Product</option>
                        {% for p in products %}
                            <option value="{{ p.name }}" data-price="{{ p.price }}" data-gst="{{ p.gst_percent }}">
                                {{ p.name }}
                            </option>
                        {% endfor %}
                    </select>
                </td>
                <td><input name="quantity[]" type="number" class="form-control" oninput="calculateTotal()" required></td>
                <td><input name="price[]" type="number" class="form-control" oninput="calculateTotal()" required></td>
                <td><input name="gst[]" type="number" class="form-control" oninput="calculateTotal()" required></td>
            `;
        }

        function calculateTotal() {
            let qtys = document.getElementsByName("quantity[]");
            let prices = document.getElementsByName("price[]");
            let gsts = document.getElementsByName("gst[]");

            let total = 0;
            let gst_total = 0;

            for (let i = 0; i < qtys.length; i++) {
                let qty = parseFloat(qtys[i].value) || 0;
                let price = parseFloat(prices[i].value) || 0;
                let gst = parseFloat(gsts[i].value) || 0;

                let row_total = qty * price;
                let row_gst = (row_total * gst) / 100;

                total += row_total;
                gst_total += row_gst;
            }

            document.getElementById("total").innerText = total.toFixed(2);
            document.getElementById("gst_total").innerText = gst_total.toFixed(2);
            document.getElementById("final_total").innerText = (total + gst_total).toFixed(2);
        }
    </script>
</head>

<body>

<div class="container mt-4">

    <h3 class="mb-3">Create Invoice</h3>

    <div class="card-box">

    <form method="POST">
        {% csrf_token %}

        <!-- COMPANY -->
        <div class="mb-3">
            <label class="form-label">Select Company</label>
            <select name="company_id" class="form-control" required>
                {% for company in companies %}
                    <option value="{{ company.id }}">{{ company.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- TABLE -->
        <table class="table table-bordered" id="items">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>GST %</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>
                        <select name="product[]" class="form-control" onchange="setProductDetails(this)" required>
                            <option value="">Select Product</option>
                            {% for p in products %}
                                <option value="{{ p.name }}" data-price="{{ p.price }}" data-gst="{{ p.gst_percent }}">
                                    {{ p.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </td>

                    <td><input name="quantity[]" type="number" class="form-control" oninput="calculateTotal()" required></td>
                    <td><input name="price[]" type="number" class="form-control" oninput="calculateTotal()" required></td>
                    <td><input name="gst[]" type="number" class="form-control" oninput="calculateTotal()" required></td>
                </tr>
            </tbody>
        </table>

        <!-- ADD BUTTON -->
        <button type="button" class="btn btn-primary mb-3" onclick="addRow()">+ Add Item</button>

        <!-- SUMMARY -->
        <div class="summary-box">
            <h5>Total: ₹ <span id="total">0</span></h5>
            <h5>GST: ₹ <span id="gst_total">0</span></h5>
            <h4 class="text-success">Final: ₹ <span id="final_total">0</span></h4>
        </div>

        <br>

        <button type="submit" class="btn btn-success">Save Invoice</button>

    </form>

    </div>

</div>

</body>
</html>
