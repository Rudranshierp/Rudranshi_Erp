{% extends 'base.html' %}

{% block content %}

<h2>Customers</h2>

<a href="/create-customer/">+ Add Customer</a>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
    </tr>

    {% for c in customers %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.email }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
